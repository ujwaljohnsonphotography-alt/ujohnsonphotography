
<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landscape — UJPhotography</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #f4f0ea;
        --ink: #1a1714;
        --warm-gray: #8a847c;
        --gold: #b89c6a;
        --off-white: #faf8f5;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--off-white);
        color: var(--ink);
        font-family: "Jost", sans-serif;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 24px 60px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      .brand {
        font-family: "Cormorant Garamond", serif;
        letter-spacing: 0.15em;
        font-size: 1.2rem;
        color: var(--ink);
        text-decoration: none;
      }
      .back {
        font-size: 0.7rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--warm-gray);
        text-decoration: none;
        border-bottom: 1px solid rgba(184, 156, 106, 0.35);
        padding-bottom: 4px;
      }
      .back:hover {
        color: var(--gold);
      }
      .section-eyebrow {
        font-size: 0.6rem;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--gold);
        margin: 8px 0 12px;
      }
      h1 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-size: clamp(2.2rem, 5vw, 3.4rem);
        margin: 0 0 8px;
      }
      .subtitle {
        color: #4a443e;
        letter-spacing: 0.03em;
        margin-bottom: 24px;
      }
      .cats {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 8px 0 28px;
      }
      .cat {
        display: inline-block;
        padding: 8px 14px;
        border: 1px solid rgba(184, 156, 106, 0.35);
        text-decoration: none;
        color: var(--ink);
        font-size: 0.75rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        border-radius: 2px;
        transition: all 0.2s;
      }
      .cat:hover {
        color: var(--gold);
        border-color: var(--gold);
      }
      .cat.active {
        background: var(--ink);
        color: var(--cream);
        border-color: var(--ink);
      }
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
      }
      .card {
        position: relative;
        overflow: hidden;
        background: #0f1418;
        border-radius: 4px;
      }
      .card img {
        width: 100%;
        height: 320px;
        object-fit: cover;
        display: block;
        transition: transform 0.6s ease;
      }
      .card:hover img {
        transform: scale(1.06);
      }
      .cap {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px 12px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.45), transparent);
        color: #eee;
        font-family: "Cormorant Garamond", serif;
        letter-spacing: 0.06em;
      }
      footer {
        margin-top: 40px;
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        color: rgba(138, 132, 124, 0.7);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <a class="brand" href="../index.html">UJPhotography</a>
        <a class="back" href="../index.html#portfolio">← Back to Home</a>
      </div>

      <div class="section-eyebrow">Portfolio</div>
      <h1>Landscape</h1>
      <div class="subtitle">
        Mountains, coasts, and quiet horizons — nature’s grand stage.
      </div>

      <nav class="cats">
        <a class="cat" href="portraiture.html">Portraiture</a>
        <a class="cat active" href="landscape.html">Landscape</a>
        <a class="cat" href="wedding.html">Wedding</a>
        <a class="cat" href="street.html">Street</a>
        <a class="cat" href="automotive.html">Automotive</a>
        <a class="cat" href="realestate.html">Real Estate</a>
      </nav>

      <div class="gallery">
        <div class="card">
          <img
            src="../images/portfolio/landscape/1.jpg"
            data-fallback="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1600&q=80"
            alt="Landscape 1"
            onerror="
              if (this.src !== this.dataset.fallback) {
                this.src = this.dataset.fallback;
              }
            "
          />
          <div class="cap">Alpine Dawn</div>
        </div>
        <div class="card">
          <img
            src="../images/portfolio/landscape/2.jpg"
            data-fallback="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1600&q=80"
            alt="Landscape 2"
            onerror="
              if (this.src !== this.dataset.fallback) {
                this.src = this.dataset.fallback;
              }
            "
          />
          <div class="cap">Sea Cliffs</div>
        </div>
        <div class="card">
          <img
            src="../images/portfolio/landscape/3.jpg"
            data-fallback="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1600&q=80"
            alt="Landscape 3"
            onerror="
              if (this.src !== this.dataset.fallback) {
                this.src = this.dataset.fallback;
              }
            "
          />
          <div class="cap">Misty Pines</div>
        </div>
        <div class="card">
          <img
            src="../images/portfolio/landscape/4.jpg"
            data-fallback="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=1600&q=80"
            alt="Landscape 4"
            onerror="
              if (this.src !== this.dataset.fallback) {
                this.src = this.dataset.fallback;
              }
            "
          />
          <div class="cap">Valley Light</div>
        </div>
        <div class="card">
          <img
            src="../images/portfolio/landscape/5.jpg"
            data-fallback="https://images.unsplash.com/photo-1502082553048-f009c37129b9?w=1600&q=80"
            alt="Landscape 5"
            onerror="
              if (this.src !== this.dataset.fallback) {
                this.src = this.dataset.fallback;
              }
            "
          />
          <div class="cap">Desert Lines</div>
        </div>
        <div class="card">
          <img
            src="../images/portfolio/landscape/6.jpg"
            data-fallback="https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=1600&q=80"
            alt="Landscape 6"
            onerror="
              if (this.src !== this.dataset.fallback) {
                this.src = this.dataset.fallback;
              }
            "
          />
          <div class="cap">Evening Glow</div>
        </div>
      </div>

      <footer>© 2024 UJPhotography. All rights reserved.</footer>
    </div>
  </body>
</html>
