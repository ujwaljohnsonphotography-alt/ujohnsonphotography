<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>UJPhotography — Portraiture</title>
  <meta name="description" content="Portraiture gallery by UJPhotography — large-format, auto-playing slideshow." />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    /* ===== Base + Palette (matches your site) ===== */
    :root{
      --cream:#f4f0ea;
      --ink:#1a1714;
      --warm-gray:#8a847c;
      --gold:#b89c6a;
      --light-gold:#d4bc8e;
      --off-white:#faf8f5;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:'Jost',sans-serif;
      color:var(--cream);
      background:var(--ink);
      overflow-x:hidden;
    }

    /* ===== Fullscreen slideshow ===== */
    .hero{
      position:relative;
      height:100vh;
      overflow:hidden;
      background:var(--ink);
    }
    .hero-slideshow{
      position:absolute;
      inset:0;
      z-index:0;
    }
    .hero-slide{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      opacity:0;
      transform:scale(1.05);                       /* subtle parallax zoom */
      transition:opacity 1.6s ease-in-out, transform 6s ease-out;
    }
    .hero-slide.active{
      opacity:1;
      transform:scale(1);
    }

    /* Soft gradient so dots are always readable */
    .hero-bg{
      position:absolute;
      inset:0;
      background:
        linear-gradient(160deg, transparent 40%, rgba(26,23,20,0.65) 100%),
        linear-gradient(to bottom, rgba(26,23,20,0.15) 0%, transparent 30%, rgba(26,23,20,0.85) 100%);
      z-index:1;
      pointer-events:none;
    }

    /* Dots (left-bottom, like homepage) */
    .slide-dots{
      position:absolute;
      left:32px;
      bottom:36px;
      display:flex;
      gap:10px;
      z-index:2;
    }
    .slide-dot{
      width:22px;
      height:2px;
      background:rgba(244,240,234,0.35);
      cursor:pointer;
      transition:width .3s, background .3s, transform .2s;
    }
    .slide-dot:hover{ transform:scaleX(1.1) }
    .slide-dot.active{
      width:42px;
      background:var(--gold);
    }

    /* Optional tiny overlay title (can remove if you want a pure slideshow) */
    .page-badge{
      position:absolute;
      top:26px;
      left:26px;
      z-index:2;
      font-size:.65rem;
      letter-spacing:.35em;
      text-transform:uppercase;
      color:var(--light-gold);
      padding:8px 12px;
      background:rgba(0,0,0,0.28);
      border:1px solid rgba(184,156,106,0.35);
      backdrop-filter:blur(4px);
    }

    /* Mobile adjustments */
    @media (max-width:768px){
      .slide-dots{ left:20px; bottom:24px }
      .page-badge{ top:18px; left:18px; letter-spacing:.28em }
    }
  </style>
</head>
<body>

  <!-- ===== Portraiture Slideshow ONLY ===== -->
  <section class="hero" aria-label="Portraiture slideshow">
    <div class="hero-slideshow" id="heroSlideshow">
      <!-- Replace these with your actual images -->
      <div class="hero-slide active" style="background-image:url('../images/portfolio/portraiture/slide1.jpg');"></div>
      <div class="hero-slide"        style="background-image:url('../images/portfolio/portraiture/slide2.jpg');"></div>
      <div class="hero-slide"        style="background-image:url('../images/portfolio/portraiture/slide3.jpg');"></div>
      <!-- Add more slides if you want
      <div class="hero-slide"        style="background-image:url('../images/portfolio/portraiture/slide4.jpg');"></div>
      <div class="hero-slide"        style="background-image:url('../images/portfolio/portraiture/slide5.jpg');"></div>
      -->
    </div>

    <div class="hero-bg" aria-hidden="true"></div>

    <!-- Small page badge (optional) -->
    <div class="page-badge">Portraiture</div>

    <!-- Dots -->
    <div class="slide-dots" id="slideDots" aria-label="Slideshow navigation"></div>
  </section>

  <script>
    // Minimal, reliable slider logic (auto + dots + keyboard + (optional) pause on hover)
    (function () {
      const slides = Array.from(document.querySelectorAll('.hero-slide'));
      const dotsContainer = document.getElementById('slideDots');

      if (!slides.length) return;

      let current = 0;
      let timerId = null;
      const INTERVAL = 5000; // 5 seconds

      // Create dots
      slides.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.type = 'button';
        dot.className = 'slide-dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
        dot.addEventListener('click', () => goTo(i));
        dotsContainer.appendChild(dot);
      });

      function goTo(index) {
        if (index === current) return;
        slides[current].classList.remove('active');
        dotsContainer.children[current].classList.remove('active');

        current = (index + slides.length) % slides.length;

        slides[current].classList.add('active');
        dotsContainer.children[current].classList.add('active');
      }

      function next() { goTo(current + 1); }
      function prev() { goTo(current - 1); }

      function start() {
        stop();
        timerId = setInterval(next, INTERVAL);
      }
      function stop() {
        if (timerId) clearInterval(timerId);
        timerId = null;
      }

      // Auto-play
      start();

      // Pause on hover (optional — comment these 2 lines if not desired)
      const hero = document.querySelector('.hero');
      hero.addEventListener('mouseenter', stop);
      hero.addEventListener('mouseleave', start);

      // Pause when tab not visible (saves CPU/battery)
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) stop(); else start();
      });

      // Keyboard navigation (←/→)
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') { next(); start(); }
        if (e.key === 'ArrowLeft')  { prev(); start(); }
      }, { passive: true });

      // Basic swipe support for mobile
