<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UJPhotography — Real Estate</title>
  <meta name="description" content="Real Estate photography by UJPhotography — architecture, interiors, luxury spaces and editorial real estate compositions." />

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap">

  <style>
    /* ===== Base + Palette ===== */
    :root{
      --cream:#f4f0ea;
      --ink:#1a1714;
      --warm-gray:#8a847c;
      --gold:#b89c6a;
      --light-gold:#d4bc8e;
      --off-white:#faf8f5;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:'Jost',sans-serif;
      color:var(--cream);
      background:var(--ink);
      overflow-x:hidden;
    }
    a{ text-decoration:none }

    /* ===== Header ===== */
    .header{
      position:fixed; top:0; left:0; right:0; z-index:20;
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 22px;
      background:linear-gradient(to bottom, rgba(26,23,20,0.85), rgba(26,23,20,0.15));
      transition:background .25s ease, backdrop-filter .25s ease;
    }
    .header.scrolled{
      background:rgba(26,23,20,.85);
      backdrop-filter:blur(6px);
    }
    .brand{
      color:var(--cream);
      letter-spacing:.18em;
      font-family:'Cormorant Garamond', serif;
      font-size:1.1rem;
    }
    .brand span{ color:var(--light-gold) }
    .nav-links{
      display:flex; gap:14px; flex-wrap:wrap; align-items:center;
    }
    .nav-links a{
      color:rgba(250,248,245,0.85);
      font-size:.72rem; letter-spacing:.22em; text-transform:uppercase;
      padding:6px 8px; border-bottom:1px solid transparent;
      transition:color .2s, border-color .2s;
    }
    .nav-links a:hover{ color:var(--gold) }
    .nav-links a.active{
      color:var(--gold);
      border-color:rgba(184,156,106,0.55);
    }
    .home-link{
      color:var(--cream); margin-right:10px; padding:6px 10px;
      border:1px solid rgba(255,255,255,0.18); border-radius:2px;
      font-size:.72rem; letter-spacing:.18em; text-transform:uppercase;
    }
    .home-link:hover{
      background:rgba(184,156,106,.14);
      color:var(--light-gold);
      border-color:rgba(184,156,106,.45);
    }

    /* ===== Slideshow ===== */
    main{ margin-top:56px; }

    .hero{
      position:relative; height:100vh; overflow:hidden; background:var(--ink);
    }
    .hero-slideshow{
      position:absolute; inset:0; z-index:0;
    }
    .hero-slide{
      position:absolute; inset:0;
      background-size:cover; background-position:center;
      opacity:0; transform:scale(1.05);
      transition:opacity 1.6s ease-in-out, transform 6s ease-out;
    }
    .hero-slide.active{
      opacity:1; transform:scale(1);
    }

    .hero-caption{
      position:absolute; bottom:18px; right:20px; z-index:3;
      font-size:.7rem; letter-spacing:.22em; text-transform:uppercase;
      color:rgba(244,240,234,.85);
      background:rgba(0,0,0,0.28);
      border:1px solid rgba(255,255,255,0.18);
      padding:6px 10px;
      backdrop-filter:blur(4px);
    }

    .hero-bg{
      position:absolute; inset:0; z-index:1; pointer-events:none;
      background:
        linear-gradient(160deg, transparent 40%, rgba(26,23,20,0.65) 100%),
        linear-gradient(to bottom, rgba(26,23,20,0.15) 0%, transparent 30%, rgba(26,23,20,0.85) 100%);
    }

    .slide-dots{
      position:absolute; left:28px; bottom:34px;
      display:flex; gap:10px; z-index:3;
    }
    .slide-dot{
      width:22px; height:2px;
      background:rgba(244,240,234,0.35);
      transition:.3s; cursor:pointer;
    }
    .slide-dot.active{
      width:42px; background:var(--gold);
    }

    .hero-arrow{
      position:absolute; top:50%; transform:translateY(-50%);
      width:44px; height:44px; z-index:3;
      display:flex; align-items:center; justify-content:center;
      border-radius:50%;
      background:rgba(0,0,0,0.28);
      border:1px solid rgba(255,255,255,0.18);
      color:var(--cream); cursor:pointer;
      backdrop-filter:blur(4px);
    }
    .hero-arrow.prev{ left:18px; }
    .hero-arrow.next{ right:18px; }
    .hero-arrow:hover{
      background:rgba(184,156,106,0.22);
      color:var(--light-gold);
      border-color:rgba(184,156,106,0.45);
    }

    @media(max-width:480px){
      .hero-arrow{ width:38px; height:38px; }
    }

    /* ===== Write-up ===== */
    .series-copy{
      background:var(--off-white); color:var(--ink);
      padding:72px 24px; display:grid; place-items:center;
    }
    .series-inner{
      width:min(1100px,92vw);
    }
    .eyebrow{
      font-size:.62rem; letter-spacing:.42em;
      color:var(--gold); text-transform:uppercase;
      margin-bottom:16px;
    }
    .series-title{
      font-family:'Cormorant Garamond',serif;
