
<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automotive — UJPhotography</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #f4f0ea;
        --ink: #1a1714;
        --warm-gray: #8a847c;
        --gold: #b89c6a;
        --off-white: #faf8f5;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--off-white);
        color: var(--ink);
        font-family: "Jost", sans-serif;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 24px 60px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      .brand {
        font-family: "Cormorant Garamond", serif;
        letter-spacing: 0.15em;
        font-size: 1.2rem;
        color: var(--ink);
        text-decoration: none;
      }
      .back {
        font-size: 0.7rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--warm-gray);
        text-decoration: none;
        border-bottom: 1px solid rgba(184, 156, 106, 0.35);
        padding-bottom: 4px;
      }
      .back:hover {
        color: var(--gold);
      }
      .section-eyebrow {
        font-size: 0.6rem;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--gold);
        margin: 8px 0 12px;
      }
      h1 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-size: clamp(2.2rem, 5vw, 3.4rem);
        margin: 0 0 8px;
      }
      .subtitle {
        color: #4a443e;
        letter-spacing: 0.03em;
        margin-bottom: 24px;
      }
      .cats {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 8px 0 28px;
      }
      .cat {
        display: inline-block;
        padding: 8px 14px;
        border: 1px solid rgba(184, 156, 106, 0.35);
        text-decoration: none;
        color: var(--ink);
        font-size: 0.75rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        border-radius: 2px;
        transition: all 0.2s;
      }
      .cat:hover {
        color: var(--gold);
        border-color: var(--gold);
      }
      .cat.active {
        background: var(--ink);
        color: var(--cream);
        border-color: var(--ink);
      }
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
      }
      .card {
        position: relative;
        overflow: hidden;
        background: #0f0f0f;
        border-radius: 4px;
      }
      .card img {
        width: 100%;
        height: 320px;
        object-fit: cover;
        display: block;
        transition: transform 0.6s ease;
      }
      .card:hover img {
        transform: scale(1.06);
      }
      .cap {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px 12px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.45), transparent);
        color: #eee;
        font-family: "Cormorant Garamond", serif;
        letter-spacing: 0.06em;
      }
      footer {
        margin-top: 40px;
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        color: rgba(138, 132, 124, 0.7);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <a class="brand" href="../index.html">UJPhotography</a>
        <a class="back" href="../index.html#portfolio">← Back to Home</a>
      </div>

      <div class="section-eyebrow">Portfolio</div>
      <h1>Automotive</h1>
      <div class="subtitle">
        Speed, style, and sculpted lines in motion and stillness.
      </div>

      <nav class="cats">
        <a class="cat" href="portraiture.html">Portraiture</a>
        <a class="cat" href="landscape.html">Landscape</a>
        <a class="cat" href="wedding.html">Wedding</a>
        <a class="cat" href="street.html">Street</a>
        <a class="cat active" href="automotive.html">Automotive</a>
        <a class="cat" href="realestate.html">Real Estate</a>
      </nav>

      <div class="gallery">
        <div class="card">
          <img
            src="../images/portfolio/automotive/1.jpg"
            data-fallback="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1400&q=80"
            alt="Automotive 1"
            onerror="
              if (this.src !== this.dataset.fallback) {
                this.src = this.dataset.fallback;
              }
            "
          />
          <div class="cap">Night Drive</div>
        </div>
        <div class="card">
          <img
            src="../images/portfolio/automotive/2.jpg"
            data-fallback="https://images.unsplash.com/photo-1483721310020-03333e577078?w=1400&q=80"
            alt="Automotive 2"
            onerror="
              if (this.src !== this.dataset.fallback) {
                this.src = this.dataset.fallback;
              }
            "
          />
          <div class="cap">Retro Chrome</div>
        </div>
        <div class="card">
          <img
            src="../images/portfolio/automotive/3.jpg"
            data-fallback="https://images.unsplash.com/photo-1517673400267-0251440c45dc?w=1400&q=80"
            alt="Automotive 3"
            onerror="
              if (this.src !== this.dataset.fallback) {
                this.src = this.dataset.fallback;
              }
            "
          />
          <div class="cap">Track Day</div>
        </div>
        <div class="card">
          <img
            src="../images/portfolio/automotive/4.jpg"
            data-fallback="https://images.unsplash.com/photo-1503736334956-4c8f8e92946d?w=1400&q=80"
            alt="Automotive 4"
            onerror="
              if (this.src !== this.dataset.fallback) {
                this.src = this.dataset.fallback;
              }
            "
          />
          <div class="cap">Reflections</div>
        </div>
        <div class="card">
          <img
            src="../images/portfolio/automotive/5.jpg"
            data-fallback="https://images.unsplash.com/photo-1502877338535-766e1452684a?w=1400&q=80"
            alt="Automotive 5"
            onerror="
              if (this.src !== this.dataset.fallback) {
                this.src = this.dataset.fallback;
              }
            "
          />
          <div class="cap">City Sprint</div>
        </div>
        <div class="card">
          <img
            src="../images/portfolio/automotive/6.jpg"
            data-fallback="https://images.unsplash.com/photo-1512428559087-560fa5ceab42?w=1400&q=80"
            alt="Automotive 6"
            onerror="
              if (this.src !== this.dataset.fallback) {
                this.src = this.dataset.fallback;
              }
            "
          />
          <div class="cap">Garage Light</div>
        </div>
      </div>

      <footer>© 2024 UJPhotography. All rights reserved.</footer>
    </div>
  </body>
</html>
