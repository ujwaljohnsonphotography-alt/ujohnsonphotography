<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>UJPhotography — Automotive</title>
  <meta name="description" content="Automotive gallery by UJPhotography — dramatic lighting, motion frames, and cinematic automotive compositions." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" />

  <style>
    /* ===== Base + Palette ===== */
    :root{
      --cream:#f4f0ea;
      --ink:#1a1714;
      --warm-gray:#8a847c;
      --gold:#b89c6a;
      --light-gold:#d4bc8e;
      --off-white:#faf8f5;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:'Jost',sans-serif;
      color:var(--cream);
      background:var(--ink);
      overflow-x:hidden;
    }
    a{ text-decoration:none }

    /* ===== Header ===== */
    .header{
      position:fixed; top:0; left:0; right:0; z-index:20;
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 22px;
      background:linear-gradient(to bottom, rgba(26,23,20,0.85), rgba(26,23,20,0.15));
      transition:background .25s ease, backdrop-filter .25s ease;
    }
    .header.scrolled{
      background:rgba(26,23,20,.85);
      backdrop-filter:blur(6px);
    }
    .brand{
      color:var(--cream);
      letter-spacing:.18em;
      font-family:'Cormorant Garamond', serif;
      font-size:1.1rem;
    }
    .brand span{ color:var(--light-gold) }
